<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promptfoo Desktop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Promptfoo Desktop</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">◫</span> Dashboard
        </a>
        <a href="#configs" class="nav-item" data-page="configs">
          <span class="nav-icon">⚙</span> Configs
        </a>
        <a href="#runs" class="nav-item" data-page="runs">
          <span class="nav-icon">▶</span> Runs
        </a>
        <a href="#redteam" class="nav-item" data-page="redteam">
          <span class="nav-icon">🛡</span> Red Team
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="version">v1.0.0</span>
      </div>
    </aside>

    <main class="content">
      <!-- Dashboard -->
      <section id="page-dashboard" class="page active">
        <div class="page-header">
          <h1>Dashboard</h1>
        </div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="section">
          <h2>Trends</h2>
          <div class="trends-grid" id="trends-grid"></div>
        </div>
        <div class="section">
          <h2>Workflow Upgrades</h2>
          <div id="workflow-upgrades"></div>
        </div>
        <div class="section">
          <h2>Recent Runs</h2>
          <div id="recent-runs"></div>
        </div>
      </section>

      <!-- Configs -->
      <section id="page-configs" class="page">
        <div class="page-header">
          <h1>Test Configurations</h1>
          <div class="page-actions">
            <button class="btn btn-secondary" id="btn-templates">From Template</button>
            <button class="btn btn-primary" id="btn-new-config">New Config</button>
          </div>
        </div>
        <div id="configs-list"></div>

        <!-- Config Modal -->
        <div class="modal" id="config-modal">
          <div class="modal-content modal-lg">
            <div class="modal-header">
              <h2 id="config-modal-title">New Config</h2>
              <button class="btn-close" id="config-modal-close">&times;</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label>Name</label>
                <input type="text" id="config-name" placeholder="My test config">
              </div>
              <div class="form-group">
                <label>Description</label>
                <input type="text" id="config-desc" placeholder="Optional description">
              </div>
              <div class="form-group">
                <label>YAML Configuration</label>
                <textarea id="config-yaml" rows="18" placeholder="description: My eval&#10;providers:&#10;  - openai:gpt-4o-mini&#10;prompts:&#10;  - 'Answer: {{question}}'&#10;tests:&#10;  - vars:&#10;      question: What is 2+2?&#10;    assert:&#10;      - type: contains&#10;        value: '4'"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" id="config-cancel">Cancel</button>
              <button class="btn btn-primary" id="config-save">Save</button>
            </div>
          </div>
        </div>

        <!-- Version History Modal -->
        <div class="modal" id="version-modal">
          <div class="modal-content modal-xl">
            <div class="modal-header">
              <h2 id="version-modal-title">Version History</h2>
              <button class="btn-close" id="version-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="version-detail"></div>
          </div>
        </div>

        <!-- Version Diff Modal -->
        <div class="modal" id="diff-modal">
          <div class="modal-content modal-xl">
            <div class="modal-header">
              <h2 id="diff-modal-title">Version Diff</h2>
              <button class="btn-close" id="diff-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="diff-detail"></div>
          </div>
        </div>

        <!-- Template Modal -->
        <div class="modal" id="template-modal">
          <div class="modal-content">
            <div class="modal-header">
              <h2>Choose Template</h2>
              <button class="btn-close" id="template-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="template-list"></div>
          </div>
        </div>
      </section>

      <!-- Runs -->
      <section id="page-runs" class="page">
        <div class="page-header">
          <h1>Test Runs</h1>
          <div class="page-actions">
            <button class="btn btn-danger btn-sm" id="btn-bulk-delete" disabled>Delete Selected</button>
            <button class="btn btn-secondary" id="btn-compare" disabled>Compare Selected</button>
          </div>
        </div>
        <div class="filter-bar" id="runs-filter-bar">
          <select id="filter-status">
            <option value="">All Statuses</option>
            <option value="completed">Completed</option>
            <option value="running">Running</option>
            <option value="error">Error</option>
            <option value="pending">Pending</option>
          </select>
          <select id="filter-tag">
            <option value="">All Tags</option>
          </select>
          <select id="filter-provider">
            <option value="">All Providers</option>
          </select>
          <input type="date" id="filter-from" title="From date">
          <input type="date" id="filter-to" title="To date">
          <button class="btn btn-secondary btn-sm" id="btn-filter-apply">Apply</button>
          <button class="btn btn-secondary btn-sm" id="btn-filter-clear">Clear</button>
        </div>
        <div id="runs-list"></div>

        <!-- Run Detail Modal -->
        <div class="modal" id="run-modal">
          <div class="modal-content modal-xl">
            <div class="modal-header">
              <h2 id="run-modal-title">Run Details</h2>
              <button class="btn-close" id="run-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="run-detail"></div>
          </div>
        </div>

        <!-- Comparison Modal -->
        <div class="modal" id="compare-modal">
          <div class="modal-content modal-xl">
            <div class="modal-header">
              <h2 id="compare-modal-title">Run Comparison</h2>
              <button class="btn-close" id="compare-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="compare-detail"></div>
          </div>
        </div>
      </section>

      <!-- Red Team -->
      <section id="page-redteam" class="page">
        <div class="page-header">
          <h1>Red Team Scanner</h1>
          <button class="btn btn-primary" id="btn-new-redteam">New Scan</button>
        </div>
        <div id="redteam-list"></div>

        <!-- Red Team Modal -->
        <div class="modal" id="redteam-modal">
          <div class="modal-content">
            <div class="modal-header">
              <h2>Red Team Scan</h2>
              <button class="btn-close" id="redteam-modal-close">&times;</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label>Target Provider</label>
                <input type="text" id="rt-target" placeholder="openai:gpt-4o-mini">
              </div>
              <div class="form-group">
                <label>System Prompt (optional)</label>
                <textarea id="rt-system" rows="4" placeholder="You are a helpful assistant..."></textarea>
              </div>
              <div class="form-group">
                <label>Attack Types</label>
                <div id="rt-attacks" class="checkbox-group"></div>
              </div>
              <div class="form-group">
                <label>Attack Strategies</label>
                <div id="rt-strategies" class="checkbox-group"></div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" id="rt-cancel">Cancel</button>
              <button class="btn btn-primary" id="rt-run">Run Scan</button>
            </div>
          </div>
        </div>

        <!-- Red Team Detail Modal -->
        <div class="modal" id="rt-detail-modal">
          <div class="modal-content modal-xl">
            <div class="modal-header">
              <h2 id="rt-detail-title">Scan Details</h2>
              <button class="btn-close" id="rt-detail-close">&times;</button>
            </div>
            <div class="modal-body" id="rt-detail"></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
